<!doctype html>
<html>
  <head>
    <title>🛸 Live ISS Tracker</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      #map {
        height: 100vh;
        width: 100%;
      }
      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      var map = L.map("map").setView([0, 0], 3);

      L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
          attribution: "Tiles © Esri",
        },
      ).addTo(map);

      var marker = L.marker([0, 0]).addTo(map);

      var oldLat = 0,
        oldLon = 0;
      var newLat = 0,
        newLon = 0;
      var startTime = null;
      var duration = 5000; // 5 seconds between real updates

      // Fetch real position every 5 seconds
      function fetchPosition() {
        fetch("http://127.0.0.1:5000/position")
          .then((r) => r.json())
          .then((data) => {
            oldLat = newLat;
            oldLon = newLon;
            newLat = data.latitude;
            newLon = data.longitude;
            startTime = performance.now();
          });
      }

      // Smooth animation using requestAnimationFrame
      function animate(timestamp) {
        if (startTime) {
          var progress = Math.min((timestamp - startTime) / duration, 1);
          var lat = oldLat + (newLat - oldLat) * progress;
          var lon = oldLon + (newLon - oldLon) * progress;
          marker.setLatLng([lat, lon]);
          marker.bindPopup(
            `🛸 ISS Live<br>Lat: ${lat.toFixed(4)}<br>Lon: ${lon.toFixed(4)}`,
          );
        }
        requestAnimationFrame(animate);
      }

      fetchPosition();
      setInterval(fetchPosition, 5000);
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
